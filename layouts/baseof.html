<!doctype html>
<html
	lang="{{ site.Language.Locale }}"
	dir="{{ or site.Language.Direction `ltr` }}"
>
	<head>
		{{ partial "head.html" . }}
	</head>
	<body>
		<header>{{ partial "header.html" . }}</header>
		<main>
			<div class="content-container py-6 {{ if not .IsHome }}frosted{{ end }}">
				{{ block "main" . }}{{ end }}
			</div>
		</main>
		<footer>{{ partial "footer.html" . }}</footer>
	</body>
</html>
