{{ define "main" }}
<div class="mx-auto w-full max-w-4xl px-4 py-6">
  <h1>{{ .Title }}</h1>
  <div class="timeline">
    {{ range .Params.jobs }}
    <div class="timeline-item">
      <h3>{{ .company }}</h3>
      <p class="role">{{ .role }} · {{ .duration }}</p>
      <p>{{ .description }}</p>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
