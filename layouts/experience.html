{{ define "main" }}
<div>
	<h1 class="text-3xl font-bold mb-8">{{ .Title }}</h1>
	<div class="timeline grid gap-6 mt-8">
		{{ range .Params.jobs }}
			<div class="timeline-item p-6">
				<h2 class="text-xl font-semibold">{{ .company }}</h2>
				<p class="subheading role">{{ .role }} · {{ .duration }}</p>
				<ul>
					{{ range .bullets }}
						<li>{{ . }}</li>
					{{ end }}
				</ul>
			</div>
		{{ end }}
	</div>
</div>
{{ end }}
